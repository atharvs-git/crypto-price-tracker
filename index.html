<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crypto Tracker</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body {
        background-image: url('forcryptoproject.jpg'); 
        background-repeat: no-repeat; 
        background-size: cover; 
        background-position: center;
        background-attachment: fixed;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    .container{
        width:350px;
        background:rgba(255,255,255,0);
        backdrop-filter:blur(15px); 
        padding:25px;
        border-radius:20px;
        text-align:center;
        box-shadow:0 8px 32px rgba(0,0,0,0.3);
        border: 1px solid rgba(255, 255, 255, 0.15); 
    }
    


    h1{
      margin-bottom:10px;
      color:#4e1403; 
    }

    hr {
        border: 0;
        border-top: 1px solid #050505;
        margin: 20px 0;
    }

    .line {
        height: 2px;
        background-color: black;
        width: 100%;
        margin: 20px 0;
    }



    h3{
      margin-bottom:20px;
      color:#241313; 
    }

    h4{
      margin-bottom:30px;
      color:#0c0c0c; 
    }

    input{
      width:100%;
      padding:12px;
      border:1px solid rgba(255, 255, 255, 0.2);
      border-radius:10px;
      outline:none;
      margin-bottom:15px;
      font-size:16px;
      background: rgba(255, 255, 255, 0.9); 
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#ff4d6d;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
      margin-bottom:20px;
    }

    button:hover{
      background:#6b061c;
    }

    .card{
      margin-top:20px;
      background:white;
      color:#222;
      padding:18px;
      border-radius:15px;
    }

    .price{
      color:#0c0c0c;
      font-size:28px;
      margin-top:10px;
      font-weight:bold;
    }

    .change{
      margin-top:8px;
      color:#420611;
    }
  </style>

</head>
<body>
    <div class="container">

        <h1><i>CRYPTO TRACKER</i></h1>
        <hr>
        <h3> enter a cryptocurrency name </h3>
        <h4>could be: Bitcoin , Ethereum , Tether , Binancecoin , Ripple , usd-coin , Solana , Dogecoin , figure-heloc , TRON , or others!!!</h4>
        <input type="text" id="cryptoInput" placeholder="Enter Cryptocurrency :  " />
        <button onclick="sendCryptoData()">Get Data</button>
        <div id="cryptoResult"></div>
    </div>
    
<script src="cryptoscript.js"></script>
</body>
</html>
